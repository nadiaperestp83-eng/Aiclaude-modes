name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          mkdir temp_app
          # Usa rsync para copiar apenas o conteúdo da raiz para temp_app, 
          # excluindo a pasta de destino e pastas de controle do git
          rsync -av --exclude='temp_app' --exclude='.git' --exclude='.github' . temp_app/
          
          cd temp_app
          flutter pub get
          flutter build apk --debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: temp_app/build/app/outputs/flutter-apk/app-debug.apk
