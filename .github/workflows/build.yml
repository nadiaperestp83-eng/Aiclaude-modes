name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # Cria um projeto temporário e move seus arquivos para lá
      - name: Setup project structure
        run: |
          mkdir ../temp_app
          flutter create ../temp_app
          rm -rf ../temp_app/lib ../temp_app/pubspec.yaml
          cp -r . ../temp_app/
          
      - name: Build APK
        run: |
          cd ../temp_app
          flutter pub get
          flutter build apk --release
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ../temp_app/build/app/outputs/flutter-apk/app-release.apk
