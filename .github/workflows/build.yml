name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          # 1. Cria um projeto novo para ter a estrutura nativa (android/)
          flutter create temp_app
          
          # 2. Remove o código de exemplo (mantendo as pastas nativas)
          rm -rf temp_app/lib/*
          
          # 3. Copia TODO o conteúdo da raiz do seu repositório para a pasta temporária
          # O 'rsync' é mais seguro e pula as pastas de controle (.git, .github e a própria temp_app)
          # Isso garante que se você tiver uma pasta 'assets' ou 'android' customizada, ela será copiada
          rsync -av --exclude='.git' --exclude='.github' --exclude='temp_app' . temp_app/
          
          # 4. Compila
          cd temp_app
          flutter pub get
          flutter build apk --debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: temp_app/build/app/outputs/flutter-apk/app-debug.apk
