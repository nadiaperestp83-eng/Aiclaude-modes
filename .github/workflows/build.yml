name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # Cria o projeto temporário DENTRO da pasta raiz
      - name: Setup project structure
        run: |
          mkdir temp_app
          flutter create temp_app
          # Remove arquivos padrão para mover os seus
          rm -rf temp_app/lib temp_app/pubspec.yaml
          # Copia tudo da raiz para dentro da pasta temp_app
          cp -r . temp_app/
          
      - name: Build APK
        run: |
          cd temp_app
          flutter pub get
          flutter build apk --release
          
      # O path agora aponta para dentro da pasta raiz
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
