name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          # 1. Cria um projeto completo e novo
          flutter create temp_app
          
          # 2. Apaga apenas o que veio de exemplo
          rm -rf temp_app/lib/*
          
          # 3. Copia SEUS arquivos de código para dentro do projeto criado
          # Usamos o caminho absoluto ou relativo correto
          cp -r lib/* temp_app/lib/
          cp pubspec.yaml temp_app/
          
          # 4. Entra e compila
          cd temp_app
          flutter pub get
          flutter build apk --debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: temp_app/build/app/outputs/flutter-apk/app-debug.apk
